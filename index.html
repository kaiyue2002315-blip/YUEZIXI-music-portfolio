<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音乐工作室 · 承接音乐制作</title>
  <meta name="description" content="承接音乐制作 —— 作曲 / 作词 / 编曲 / 混音 / 演唱" />
  <link rel="stylesheet" href="assets/css/styles.css?v=30" />
</head>
<body>

  <!-- 星空背景 + 流星 -->
  <div class="sky" aria-hidden="true">
    <span class="shooting-star"></span>
    <span class="shooting-star"></span>
    <span class="shooting-star"></span>
  </div>

  <!-- 顶部导航 -->
  <header class="nav">
    <a class="nav__brand" href="#top"><span class="crescent crescent--sm" aria-hidden="true"></span> <span id="navName">团队</span></a>
    <nav class="nav__links">
      <a href="#members">成员</a>
    </nav>
  </header>

  <!-- 首屏 / 团队介绍 -->
  <section class="hero" id="top">
    <div class="hero__stars" aria-hidden="true"></div>
    <div class="hero__moonframe"><span class="crescent moon-emblem" aria-hidden="true"></span></div>
    <div class="hero__inner">
      <div class="hero__text">
        <div class="hero__pinyin" id="teamPinyin"></div>
        <h1 id="teamName">—</h1>
        <p class="hero__tagline hero__tagline--big" id="teamTagline">承接音乐制作</p>
        <p class="hero__bio" id="teamIntro"></p>
        <p class="team-collab" id="teamCollab"></p>
        <a class="hero__cta" href="#members">查看成员 ↓</a>
      </div>
    </div>
  </section>

  <!-- 成员 -->
  <section class="section" id="members">
    <h2 class="section__title">团队成员<span class="section__py">Members</span></h2>
    <div class="filters filters--team">
      <div class="filters__group">
        <span class="filters__label">工种</span>
        <div class="chips" id="roleFilters"></div>
      </div>
    </div>
    <div class="members-grid" id="membersGrid"></div>
    <p class="empty" id="membersEmpty" hidden>没有该工种的成员～</p>
  </section>

  <footer class="footer">
    <span class="crescent" aria-hidden="true"></span>
    <p>© <span id="year"></span> <span id="footName"></span> · 承接音乐制作</p>
  </footer>

  <script src="assets/js/team.js?v=30"></script>
  <script src="assets/js/team-app.js?v=30"></script>
</body>
</html>
